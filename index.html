<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#2374AB" />
<title>Pavlovapp · Ficha y Plan</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pavlovapp">
<meta name="description" content="Ficha, salud y plan de entrenamiento de tus mascotas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* ===== Pavlovapp · paleta Petróleo ===== */
    --brand:#2374AB;          /* Azul — primario/superficies (header, hero) */
    --brand-d:#0E3A53;        /* Petróleo — profundo: CTA, texto/acento */
    --brand-soft:#E7F1FA;     /* Tinte azul suave para pills y fondos */
    --mint:#D6FFF6;           /* Menta — panel destacado (Sesión de hoy) */
    --mint-line:#CFEDE6;
    --coral:#FF8484;        /* Acento — la lengua */
    --coral-d:#B0392C; --coral-soft:#FFECEC;
    --yellow:#FFC24B; --yellow-soft:#FFF2CC;   /* Oro — logros */
    --gold:#946200;         /* Texto sobre amarillo/ámbar */
    --danger:#D6472F;       /* Rojo — acciones destructivas y errores */
    /* alias de compatibilidad con el marcado existente */
    --navy:var(--brand); --teal:var(--brand-d); --rose:var(--danger);
    --bg:#FFFFFF; --card:#FFFFFF; --line:#E7ECE9; --ink:#123240; --muted:#5C636B;
    --ok:#4DCCBD; --warn:var(--gold); --pend:#9AA0A6;
    --shadow:0 1px 3px rgba(24,33,29,.06),0 8px 24px rgba(24,33,29,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--brand-d)}
  .hidden{display:none !important}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:16px;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  textarea{resize:vertical;min-height:64px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:10px 0 4px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--brand-d);color:#fff;border:none;border-radius:12px;padding:12px 16px;font-weight:700;font-size:15px;letter-spacing:.2px}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:#fff;color:var(--navy);border:1px solid var(--navy)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:8px}
  .btn.danger{background:#fff;color:var(--rose);border:1px solid var(--rose)}
  .btn.block{width:100%}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .grow{flex:1;min-width:0}

  /* Auth */
  .auth-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:22px}
  .auth-card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:28px 24px;max-width:390px;width:100%}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .brand .paw{width:46px;height:46px;border-radius:14px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;padding:7px}
  .paw svg{width:100%;height:100%;display:block}
  .brand h1{font-size:19px;margin:0;color:var(--navy)}
  .muted{color:var(--muted);font-size:14px}
  .msg{margin-top:12px;padding:10px 12px;border-radius:10px;font-size:14px}
  .msg.err{background:#FBEAE7;color:var(--danger)}
  .msg.ok{background:var(--brand-soft);color:var(--brand-d)}

  /* Shell */
  header.top{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
  header.top .paw{width:36px;height:36px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;padding:5px;flex:0 0 auto}
  header.top select{width:auto;max-width:52vw;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);font-weight:600;padding:7px 10px}
  header.top select option{color:#000}
  header.top .sp{flex:1}
  .iconbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:9px;padding:7px 10px;font-size:13px}
  .wrap{max-width:820px;margin:0 auto;padding:14px 14px 90px}

  /* Tabs (bottom nav on mobile) */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  nav.tabs button{background:none;border:none;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 6px;border-radius:8px;flex:1}
  nav.tabs button .ic{font-size:19px}
  nav.tabs button.active{color:var(--brand);font-weight:800}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .card h2{font-size:16px;margin:0 0 4px;color:var(--navy)}
  .card h3{font-size:14px;margin:14px 0 6px;color:var(--teal)}
  .sect-title{display:flex;align-items:center;justify-content:space-between;margin:2px 0 10px}
  .sect-title h2{font-size:19px;margin:0;color:var(--navy)}

  .petHead{display:flex;gap:14px;align-items:center}
  .petAvatar{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--navy));color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;flex:0 0 auto;overflow:hidden}
  .petAvatar img{width:100%;height:100%;object-fit:cover}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:14px;margin-top:8px}
  .kv .k{color:var(--muted)}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--brand-soft);color:var(--brand-d)}
  .pill.warn{background:#FBF3DF;color:var(--gold)}
  .pill.rose{background:#FBEAEA;color:var(--rose)}

  .item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#fff}
  .item .top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
  .item .t{font-weight:700;font-size:15px}
  .item .d{font-size:13px;color:var(--muted)}
  .item .desc{font-size:14px;margin-top:6px;white-space:pre-wrap}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--brand-soft);color:var(--brand-d);white-space:nowrap}
  .catline{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

  /* training */
  .phase{border-left:4px solid var(--teal);padding:2px 0 2px 12px;margin:16px 0 8px}
  .phase .pt{font-weight:800;color:var(--navy);font-size:15px}
  .phase .pp{font-size:12px;color:var(--muted)}
  .phase .pf{font-size:13px;background:#EEF2F1;border-radius:10px;padding:8px 10px;margin-top:8px}
  .skill{border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;background:#fff}
  .skill .st{font-weight:700;font-size:15px;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .statusseg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-top:10px}
  .statusseg button{flex:1;border:none;background:#fff;padding:8px 4px;font-size:12px;font-weight:600;color:var(--muted)}
  .statusseg button.on-pend{background:var(--pend);color:#fff}
  .statusseg button.on-prog{background:var(--coral);color:var(--ink)}
  .statusseg button.on-ok{background:var(--ok);color:var(--ink)}
  .steps{margin:8px 0 4px;padding-left:18px;font-size:14px}
  .steps li{margin-bottom:3px}
  .vids{margin-top:8px}
  .vids a{display:block;font-size:13px;margin-bottom:4px}
  .done-c{font-size:13px;color:var(--teal);font-style:italic;margin-top:6px}
  .progbar{height:9px;background:#E9E4DA;border-radius:999px;overflow:hidden;margin-top:6px}
  .progbar span{display:block;height:100%;background:var(--brand)}

  /* level + cards */
  .level{margin:18px 0 8px}
  .level .lvtag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.5px;color:#fff;background:var(--teal);padding:3px 10px;border-radius:999px}
  .level .lvname{font-weight:800;color:var(--navy);font-size:16px;margin-top:6px}
  .level .lvsub{font-size:12px;color:var(--muted)}
  .cardgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  @media(max-width:430px){ .cardgrid{grid-template-columns:1fr 1fr} }
  .tcard{position:relative;text-align:left;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column;gap:8px;min-height:96px}
  .tcard:active{transform:translateY(1px)}
  .tcard .tt{font-weight:700;font-size:14px;line-height:1.25;color:var(--ink)}
  .tcard .meta{margin-top:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .dot.pend{background:var(--pend)} .dot.prog{background:var(--coral)} .dot.ok{background:var(--ok)}
  .stag{font-size:11px;font-weight:700;color:var(--muted)}
  .reps{font-size:11px;font-weight:700;color:var(--coral-d);background:var(--coral-soft);padding:2px 7px;border-radius:999px}
  .chk{position:absolute;top:10px;right:10px;font-size:15px}

  /* clicker */
  .clicker{background:#F7F5F0;border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center;margin-top:6px}
  .counter{font-size:52px;font-weight:800;color:var(--navy);line-height:1}
  .clickbtn{width:130px;height:130px;border-radius:50%;border:none;background:radial-gradient(circle at 35% 30%,#3FA0DE,var(--brand));color:#fff;font-size:44px;font-weight:800;box-shadow:0 10px 24px rgba(35,116,171,.38);margin:10px auto;display:block}
  .clickbtn:active{transform:scale(.94)}
  .clickrow{display:flex;gap:8px;justify-content:center;margin-top:4px}

  .hero{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;border-radius:16px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .hero b{font-weight:800}
  .hero .pct{font-weight:800;opacity:.92}
  .hero-bar{background:rgba(255,255,255,.28)}
  .hero-bar span{background:var(--yellow)}
  .hero-sub{font-size:12px;opacity:.9;margin-top:8px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,30,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:92dvh;overflow:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
  .modal h3{margin:0 0 4px;color:var(--navy)}
  .modal .close{position:sticky;top:0;float:right;background:none;border:none;font-size:22px;color:var(--muted)}
  @media(min-width:640px){ .modal-bg{align-items:center} .modal{border-radius:18px} }

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:22px 8px}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--navy);border-radius:50%;animation:sp 0.8s linear infinite;margin:30px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:80;box-shadow:var(--shadow)}

  /* ===== íconos flat ===== */
  .ic-svg{width:1.05em;height:1.05em;display:inline-block;vertical-align:-.16em;flex:0 0 auto}
  .sect-title h2,.card h2{display:flex;align-items:center;gap:8px}
  .sect-title h2 .ic-svg{width:1.15em;height:1.15em}
  nav.tabs button .ic{display:flex;align-items:center;justify-content:center;height:22px}
  nav.tabs button .ic .ic-svg{width:22px;height:22px}
  .item .t{display:flex;align-items:center;gap:7px}
  .badge .ic-svg,.pill .ic-svg{vertical-align:-.15em}
  .reps .ic-svg{width:13px;height:13px}
  /* estado hecho en médico */
  .medone{border-color:var(--ok)!important;background:linear-gradient(0deg,rgba(77,204,189,.08),rgba(77,204,189,.08)),#fff}
  .doneflag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:#0E7A70;background:#DAF6F2;padding:3px 8px;border-radius:999px;margin-left:6px}
  .doneflag .ic-svg{width:13px;height:13px}
  .medbtns{display:flex;flex-direction:column;gap:6px;align-items:flex-end}

  /* ===== detalle de ejercicio (Entreno) rediseñado ===== */
  .sd-head{display:flex;align-items:flex-start;gap:12px;margin:2px 0 14px}
  .sd-ico{width:48px;height:48px;border-radius:14px;background:var(--brand-soft);color:var(--brand-d);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .sd-ico .ic-svg{width:26px;height:26px}
  .sd-lvl{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--brand-d);background:var(--brand-soft);display:inline-block;padding:3px 9px;border-radius:999px}
  .sd-goal{display:flex;gap:10px;background:var(--mint);border:1px solid var(--mint-line);border-radius:14px;padding:12px 14px;margin-bottom:14px}
  .sd-goal .ic-svg{width:20px;height:20px;color:var(--brand-d);margin-top:1px}
  .sd-goal b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--brand-d);margin-bottom:2px}
  .sd-goal span{font-size:14px;font-weight:600;color:var(--ink)}
  .sd-block{margin-bottom:16px}
  .sd-bt{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .sd-bt .ic-svg{width:16px;height:16px;color:var(--brand-d)}
  .sd-steps{list-style:none;padding:0;margin:0;counter-reset:st}
  .sd-steps li{counter-increment:st;position:relative;padding:9px 12px 9px 42px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:7px;font-size:14px;font-weight:500}
  .sd-steps li::before{content:counter(st);position:absolute;left:9px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .sd-vids{display:flex;flex-direction:column;gap:8px}
  .sd-vid{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--coral-soft);border:1px solid #F6D3CB;border-radius:12px;font-size:14px;font-weight:700;color:var(--coral-d);text-decoration:none}
  .sd-vid .ic-svg{width:22px;height:22px;flex:0 0 auto}
  .sd-done{display:flex;gap:9px;align-items:flex-start;background:#EAF7F4;border:1px solid #CFEEE8;border-radius:12px;padding:11px 13px;font-size:13px;color:#0E5F58;font-weight:600}
  .sd-done .ic-svg{width:18px;height:18px;color:var(--ok);margin-top:1px}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="authView" class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><div class="paw"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M32 12c-9.6 0-15.2 7.4-15.2 18.4 0 5.4-1.7 9-3.8 11.7-1.7 2.1-.2 4.9 2.5 4.9h33c2.7 0 4.2-2.8 2.5-4.9-2.1-2.7-3.8-6.3-3.8-11.7C47.2 19.4 41.6 12 32 12Z" fill="#2374AB"/><circle cx="32" cy="11.5" r="6.2" fill="#18211D"/><path d="M27.3 46h9.4v6.8c0 2.6-2.1 4.7-4.7 4.7s-4.7-2.1-4.7-4.7V46Z" fill="#FF8484"/></svg></div><h1>Pavlovapp</h1></div>
    <p class="muted">Ficha, historial médico y plan de entrenamiento de tus mascotas. Ingresa con tu correo y te enviamos un enlace mágico.</p>
    <div id="stepEmail">
      <label>Tu correo</label>
      <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="tucorreo@ejemplo.com" />
      <div style="height:10px"></div>
      <button class="btn block" id="sendLink">Enviar enlace de acceso</button>
    </div>
    <div id="stepCode" class="hidden">
      <p class="muted">Revisa tu correo. Puedes hacer clic en el enlace, o si el correo trae un <b>código</b>, escríbelo aquí:</p>
      <label>Código de 6 dígitos (opcional)</label>
      <input id="otp" inputmode="numeric" placeholder="123456" />
      <div style="height:10px"></div>
      <button class="btn block" id="verifyCode">Verificar código</button>
      <div style="height:8px"></div>
      <button class="btn ghost block" id="backEmail">Usar otro correo</button>
    </div>
    <div id="authMsg"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <header class="top">
    <div class="paw"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M32 12c-9.6 0-15.2 7.4-15.2 18.4 0 5.4-1.7 9-3.8 11.7-1.7 2.1-.2 4.9 2.5 4.9h33c2.7 0 4.2-2.8 2.5-4.9-2.1-2.7-3.8-6.3-3.8-11.7C47.2 19.4 41.6 12 32 12Z" fill="#2374AB"/><circle cx="32" cy="11.5" r="6.2" fill="#18211D"/><path d="M27.3 46h9.4v6.8c0 2.6-2.1 4.7-4.7 4.7s-4.7-2.1-4.7-4.7V46Z" fill="#FF8484"/></svg></div>
    <select id="petSelect" title="Mascota"></select>
    <div class="sp"></div>
    <button class="iconbtn" id="addPetBtn" title="Agregar mascota"><svg class="ic-svg" style="width:18px;height:18px;vertical-align:-.2em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
    <button class="iconbtn" id="logoutBtn" title="Salir">Salir</button>
  </header>

  <div class="wrap">
    <div id="loading" class="spin"></div>
    <div id="tab-resumen" class="tabpane hidden"></div>
    <div id="tab-medico" class="tabpane hidden"></div>
    <div id="tab-diario" class="tabpane hidden"></div>
    <div id="tab-entreno" class="tabpane hidden"></div>
    <div id="tab-recordatorios" class="tabpane hidden"></div>
    <div id="tab-contactos" class="tabpane hidden"></div>
  </div>

  <nav class="tabs">
    <button data-tab="resumen" class="active"><span class="ic"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="6" cy="11.5" rx="1.7" ry="2.2"/><ellipse cx="10" cy="8.5" rx="1.7" ry="2.4"/><ellipse cx="14" cy="8.5" rx="1.7" ry="2.4"/><ellipse cx="18" cy="11.5" rx="1.7" ry="2.2"/><path d="M8.5 15.6c1.2-1.7 5.8-1.7 7 0 .9 1.3.2 3.1-1.5 3.1-.9 0-1.3-.4-2-.4s-1.1.4-2 .4c-1.7 0-2.4-1.8-1.5-3.1Z"/></svg></span>Ficha</button>
    <button data-tab="medico"><span class="ic"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v5a4 4 0 0 0 8 0V3"/><path d="M6 3H4.5M14 3h1.5"/><path d="M10 16v1a4 4 0 0 0 8 0v-2"/><circle cx="18" cy="12" r="2"/></svg></span>Médico</button>
    <button data-tab="diario"><span class="ic"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 3v18"/><path d="M12 8h4M12 12h4"/></svg></span>Diario</button>
    <button data-tab="entreno"><span class="ic"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9l10-4.5L22 9l-10 4.5L2 9Z"/><path d="M6 11v4c0 1.6 2.7 3 6 3s6-1.4 6-3v-4"/><path d="M22 9v5"/></svg></span>Entreno</button>

// ============ AUTH FLOW ============
el("sendLink").onclick = async () => {
  const email = el("email").value.trim();
  if(!email){ authMsg("Escribe tu correo.",false); return; }
  el("sendLink").disabled=true; authMsg("Enviando…",true);
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.href.split("#")[0] } });
  el("sendLink").disabled=false;
  if(error){ authMsg(error.message,false); return; }
  S._email = email;
  el("stepEmail").classList.add("hidden"); el("stepCode").classList.remove("hidden");
  authMsg("Te enviamos el acceso a "+email+".",true);
};
el("backEmail").onclick = () => { el("stepCode").classList.add("hidden"); el("stepEmail").classList.remove("hidden"); authMsg(""); };
el("verifyCode").onclick = async () => {
  const token = el("otp").value.trim();
  if(!token){ authMsg("Escribe el código, o usa el enlace del correo.",false); return; }
  el("verifyCode").disabled=true; authMsg("Verificando…",true);
  const { error } = await sb.auth.verifyOtp({ email:S._email, token, type:"email" });
  el("verifyCode").disabled=false;
  if(error){ authMsg(error.message+" (si tu correo no trae código, usa el enlace).",false); return; }
};
el("logoutBtn").onclick = async () => { await sb.auth.signOut(); location.reload(); };

sb.auth.onAuthStateChange((_e, session) => {
  if(session && session.user){ S.user = session.user; showApp(); }
});

async function init(){
  const { data:{ session } } = await sb.auth.getSession();

// ============ DATA LOADING ============
async function loadFamiliesAndPets(){
  el("loading").classList.remove("hidden");
  hideAllPanes();
  // families I belong to
  const { data:fm } = await sb.from("family_members").select("family_id, role, families(id,name)").not("user_id","is",null);
  S.families = (fm||[]).filter(x=>x.families).map(x=>({ id:x.families.id, name:x.families.name, role:x.role }));
  if(S.families.length===0){ el("loading").classList.add("hidden"); return openOnboarding(); }
  S.family = S.families[0];
  const { data:pets } = await sb.from("pets").select("*").order("created_at",{ascending:true});
  S.pets = pets||[];
  renderPetSelect();
  if(S.pets.length===0){ el("loading").classList.add("hidden"); return renderTab(); }
  S.pet = S.pets[0];
  el("loading").classList.add("hidden");
  renderTab();
}

function renderPetSelect(){
  const s = el("petSelect");
  s.innerHTML = S.pets.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
  if(S.pet) s.value = S.pet.id;
  s.onchange = () => { S.pet = S.pets.find(p=>p.id===s.value); renderTab(); };
}

function pane(){ hideAllPanes(); const p = el("tab-"+S.tab); p.classList.remove("hidden"); return p; }

async function renderTab(){
  if(!S.pet && S.tab!=="contactos"){ pane().innerHTML = `<div class="empty">No hay mascota seleccionada. Toca ＋ arriba para agregar una.</div>`; return; }
  if(S.tab==="resumen") return renderResumen();
  if(S.tab==="medico") return renderMedico();
  if(S.tab==="diario") return renderDiario();
  if(S.tab==="entreno") return renderEntreno();
  if(S.tab==="recordatorios") return renderRecordatorios();
  if(S.tab==="contactos") return renderContactos();
}

// ---------- MEDICO ----------
async function renderMedico(){
  const c = pane();
  c.innerHTML = `<div class="sect-title"><h2>${ic('stethoscope')} Historial médico</h2><button class="btn sm" id="addMed">${ic('plus')} Agregar</button></div><div id="medList"><div class="spin"></div></div>`;
  el("addMed").onclick = () => openMedForm();
  const { data } = await sb.from("medical_records").select("*").eq("pet_id",S.pet.id).order("event_date",{ascending:false,nullsFirst:false}).order("next_due_date",{ascending:true,nullsFirst:false});
  const list = data||[];
  el("medList").innerHTML = list.length ? list.map(m=>{
    const cc = CAT[m.category]||CAT.nota;
    return `<div class="item ${m.done?'medone':''}"><div class="top"><div class="grow"><div class="t">${ic(cc.ic)} <span>${esc(m.title)}</span>${m.done?`<span class="doneflag">${ic('check')}Hecho</span>`:''}</div>
      <div class="d">${esc(cc.label)}${m.event_date?" · "+fmtDate(m.event_date):""}${m.next_due_date?` · próx: <b>${fmtDate(m.next_due_date)}</b>`:""}${m.vet_name?" · "+esc(m.vet_name):""}</div>
      ${m.description?`<div class="desc">${esc(m.description)}</div>`:""}</div>
      <div class="medbtns"><button class="btn sm ${m.done?'ghost':'sec'}" data-done="${m.id}" title="${m.done?'Marcar como pendiente':'Marcar como hecho'}">${m.done?ic('undo'):ic('check')}</button><button class="btn sm ghost" data-ed="${m.id}" title="Editar">${ic('pencil')}</button></div></div></div>`;
  }).join("") : `<div class="empty">Aún no hay registros médicos.</div>`;
  c.querySelectorAll("[data-done]").forEach(b=> b.onclick=async()=>{ const m=list.find(x=>x.id===b.dataset.done); await sb.from("medical_records").update({done:!m.done}).eq("id",m.id); toast(m.done?"Marcado pendiente":"¡Hecho!"); renderMedico(); });
  c.querySelectorAll("[data-ed]").forEach(b=> b.onclick=()=>openMedForm(list.find(x=>x.id===b.dataset.ed)));
}

// ---------- DIARIO ----------
async function renderDiario(){
  const c = pane();
  c.innerHTML = `<div class="sect-title"><h2>${ic('notebook')} Registro diario</h2><button class="btn sm" id="addLog">${ic('plus')} Registrar</button></div><div id="logList"><div class="spin"></div></div>`;
  el("addLog").onclick = () => openLogForm();
  const { data } = await sb.from("daily_logs").select("*").eq("pet_id",S.pet.id).order("log_date",{ascending:false}).limit(60);
  const list = data||[];
  const weights = list.filter(l=>l.weight_kg!=null).slice(0,10).reverse();
  let chart = "";
  if(weights.length>=2){
    const vals = weights.map(w=>Number(w.weight_kg));
    const mn=Math.min(...vals), mx=Math.max(...vals), rng=(mx-mn)||1;
    const pts = vals.map((v,i)=>`${(i/(vals.length-1))*100},${30-((v-mn)/rng)*26-2}`).join(" ");
    chart = `<div class="card"><h2>${ic('scale')} Peso (últimos ${vals.length})</h2><svg viewBox="0 0 100 30" preserveAspectRatio="none" style="width:100%;height:70px"><polyline points="${pts}" fill="none" stroke="#2374AB" stroke-width="1.4"/></svg><div class="d" style="font-size:12px;color:var(--muted)">${mn} – ${mx} kg</div></div>`;
  }
  el("logList").innerHTML = chart + (list.length ? list.map(l=>`
    <div class="item"><div class="top"><div class="grow"><div class="t">${fmtDate(l.log_date)}${l.weight_kg!=null?` · ${l.weight_kg} kg`:""}</div>
      <div class="d">${[l.mood?"Ánimo: "+esc(l.mood):"",l.meals?"Comidas: "+esc(l.meals):"",l.stool?"Deposiciones: "+esc(l.stool):""].filter(Boolean).join(" · ")||"—"}</div>
      ${l.notes?`<div class="desc">${esc(l.notes)}</div>`:""}</div>
      <button class="btn sm ghost" data-ed="${l.id}" title="Editar">${ic('pencil')}</button></div></div>`).join("") : `<div class="empty">Sin registros todavía. Toca “Registrar”.</div>`);
  c.querySelectorAll("[data-ed]").forEach(b=> b.onclick=()=>openLogForm(list.find(x=>x.id===b.dataset.ed)));
}

// ---------- ENTRENAMIENTO ----------
const STLABEL = {pendiente:"Pendiente",en_progreso:"En progreso",logrado:"Logrado"};
const STDOT = {pendiente:"pend",en_progreso:"prog",logrado:"ok"};
async function renderEntreno(){
  const c = pane();
  c.innerHTML = `<div class="sect-title"><h2>${ic('cap')} Entrenamiento</h2></div><div id="trHead"></div><div id="trList"><div class="spin"></div></div>`;
  const [{ data:skills }, { data:st }, { data:sess }] = await Promise.all([
    sb.from("training_skills").select("*").order("phase_order").order("skill_order"),
    sb.from("pet_skill_status").select("skill_id,status").eq("pet_id",S.pet.id),
    sb.from("skill_sessions").select("skill_id,reps").eq("pet_id",S.pet.id)
  ]);
  S._skills = skills||[];
  const statusMap = {}; (st||[]).forEach(s=>statusMap[s.skill_id]=s.status);
  const repsMap = {}; (sess||[]).forEach(s=>{ repsMap[s.skill_id]=(repsMap[s.skill_id]||0)+(s.reps||0); });
  S._statusMap = statusMap; S._repsMap = repsMap;
  const total = S._skills.length;
  const done = S._skills.filter(s=>statusMap[s.id]==="logrado").length;
  el("trHead").innerHTML = `<div class="hero"><div style="display:flex;justify-content:space-between;align-items:center;font-size:14px"><b>${done} de ${total} ejercicios logrados</b><span class="pct">${total?Math.round(done/total*100):0}%</span></div><div class="progbar hero-bar"><span style="width:${total?done/total*100:0}%"></span></div><div class="hero-sub">Toca un ejercicio para ver el detalle, los videos de Canine-Service y usar el clicker.</div></div>`;
  const phases = {};
  S._skills.forEach(s=>{ (phases[s.phase_order]=phases[s.phase_order]||{info:s,items:[]}).items.push(s); });
  let html="";
  Object.keys(phases).sort((a,b)=>a-b).forEach(k=>{
    const ph=phases[k]; const lvl=Number(k)+1;
    html += `<div class="level"><span class="lvtag">NIVEL ${lvl}</span><div class="lvname">${esc(ph.info.phase_name)}</div><div class="lvsub">${esc(ph.info.phase_period||"")}</div></div><div class="cardgrid">`;
    ph.items.forEach(s=>{
      const cur=statusMap[s.id]||"pendiente"; const r=repsMap[s.id]||0;
      html += `<button class="tcard" data-skill="${s.id}">
        ${cur==='logrado'?`<span class="chk" style="color:var(--ok)">${ic('checkcircle')}</span>`:''}
        <div class="tt">${esc(s.title)}</div>
        <div class="meta"><span class="dot ${STDOT[cur]}"></span><span class="stag">${STLABEL[cur]}</span>${r?`<span class="reps">${ic('target')} ${r}</span>`:''}</div>
      </button>`;
    });
    html += `</div>`;
  });
  el("trList").innerHTML = html;
  c.querySelectorAll(".tcard").forEach(b=> b.onclick=()=> openSkillDetail(b.dataset.skill));
}

function openSkillDetail(skillId){
  const s = (S._skills||[]).find(x=>x.id===skillId); if(!s) return;
  let cur = (S._statusMap||{})[skillId]||"pendiente";
  const steps=(s.steps||[]).map(x=>`<li>${esc(x)}</li>`).join("");
  const vids=(s.videos||[]).map(v=>`<a class="sd-vid" href="https://www.youtube.com/watch?v=${esc(v.id)}" target="_blank" rel="noopener">${ic('play')}<span>${esc(v.t)}</span></a>`).join("");
  modal(s.title,
    `<div class="sd-head">
       <div class="sd-ico">${ic('cap')}</div>
       <div style="padding-top:4px"><span class="sd-lvl">NIVEL ${Number(s.phase_order)+1}</span></div>
     </div>
     ${s.goal?`<div class="sd-goal">${ic('target')}<div><b>Objetivo</b><span>${esc(s.goal)}</span></div></div>`:""}
     ${steps?`<div class="sd-block"><div class="sd-bt">${ic('cap')} Cómo hacerlo</div><ol class="sd-steps">${steps}</ol></div>`:""}
     ${vids?`<div class="sd-block"><div class="sd-bt">${ic('play')} Videos de Canine-Service</div><div class="sd-vids">${vids}</div></div>`:""}
     ${s.done_criteria?`<div class="sd-done">${ic('checkcircle')}<div><b style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Logrado cuando</b>${esc(s.done_criteria)}</div></div>`:""}
     <div class="sd-block" style="margin-top:16px"><div class="sd-bt">${ic('checkcircle')} Estado</div>
       <div class="statusseg" id="dseg">
         <button data-v="pendiente">Pendiente</button>
         <button data-v="en_progreso">En progreso</button>
         <button data-v="logrado">Logrado</button>
       </div>
     </div>
     <div class="sd-block"><div class="sd-bt">${ic('target')} Clicker — sesión de hoy</div>
       <div class="clicker">
         <div class="counter" id="cnt">0</div>
         <div class="muted" style="font-size:12px">aciertos en esta sesión</div>
         <button class="clickbtn" id="clk">+</button>
         <div class="clickrow"><button class="btn sm ghost" id="minus">−1</button><button class="btn sm ghost" id="reset">Reiniciar</button></div>
         <div style="height:10px"></div>
         <input id="snote" placeholder="Nota de la sesión (opcional)"/>
         <div style="height:8px"></div>
         <button class="btn block" id="savesess">Guardar sesión</button>
       </div>
     </div>
     <div id="sesshist"></div>`,
    (close)=>{
      const seg=el("dseg");
      const paint=()=> seg.querySelectorAll("button").forEach(b=> b.className = b.dataset.v===cur ? (cur==='logrado'?'on-ok':cur==='en_progreso'?'on-prog':'on-pend') : "");
      paint();
      seg.querySelectorAll("button").forEach(b=> b.onclick=async()=>{ cur=b.dataset.v; paint(); await sb.from("pet_skill_status").upsert({pet_id:S.pet.id,skill_id:skillId,status:cur,updated_by:S.user.id,updated_at:new Date().toISOString()},{onConflict:"pet_id,skill_id"}); });
      let n=0; const cntEl=el("cnt");
      el("clk").onclick=()=>{ n++; cntEl.textContent=n; if(navigator.vibrate) navigator.vibrate(15); };
      el("minus").onclick=()=>{ if(n>0){ n--; cntEl.textContent=n; } };
      el("reset").onclick=()=>{ n=0; cntEl.textContent=0; };
      el("savesess").onclick=async()=>{
        if(n<=0){ toast("Cuenta al menos 1 acierto con el ＋"); return; }
        el("savesess").disabled=true;
        const { error } = await sb.from("skill_sessions").insert({ pet_id:S.pet.id, skill_id:skillId, reps:n, notes:el("snote").value.trim()||null, created_by:S.user.id });
        if(error){ toast("Error: "+error.message); el("savesess").disabled=false; return; }
        toast("Sesión guardada: "+n+" aciertos");
        close(); renderEntreno();
      };
      (async function loadSess(){
        const { data } = await sb.from("skill_sessions").select("session_date,reps,notes").eq("pet_id",S.pet.id).eq("skill_id",skillId).order("session_date",{ascending:false}).limit(8);
        const list=data||[];
        el("sesshist").innerHTML = list.length ? `<div class="sd-block"><div class="sd-bt">${ic('medal')} Historial de logros</div>`+list.map(x=>`<div class="item" style="margin-bottom:8px"><div class="t" style="font-size:14px">${ic('target')} <span>${x.reps} aciertos · ${fmtDate(x.session_date)}</span></div>${x.notes?`<div class="desc">${esc(x.notes)}</div>`:""}</div>`).join("")+`</div>` : "";
      })();
    });
}

// ---------- RECORDATORIOS ----------
async function renderRecordatorios(){
  const c = pane();
  c.innerHTML = `<div class="sect-title"><h2>${ic('bell')} Recordatorios</h2><button class="btn sm" id="addRem">${ic('plus')} Agregar</button></div><div id="remList"><div class="spin"></div></div>`;
  el("addRem").onclick = () => openRemForm();
  const [{ data:rems }, { data:meds }] = await Promise.all([
    sb.from("reminders").select("*").eq("pet_id",S.pet.id).order("due_date",{nullsFirst:false}),
    sb.from("medical_records").select("id,title,next_due_date,category").eq("pet_id",S.pet.id).not("next_due_date","is",null)
  ]);
  const today = todayISO();
  let html = "";
  const medUp = (meds||[]).filter(m=>m.next_due_date>=today);
  if(medUp.length){
    html += `<div class="card"><h2 style="font-size:15px">Del historial médico</h2>`+
      medUp.sort((a,b)=>a.next_due_date.localeCompare(b.next_due_date)).map(m=>`<div class="item" style="margin-bottom:8px"><div class="t" style="font-size:14px">${ic((CAT[m.category]||CAT.nota).ic)} <span>${esc(m.title)}</span></div><div class="d">Vence: <b>${fmtDate(m.next_due_date)}</b></div></div>`).join("")+`</div>`;
  }
  const list = rems||[];
  html += (list.length ? list.map(r=>`<div class="item ${r.done?'':''}"><div class="top"><div class="grow">
      <div class="t" style="${r.done?'text-decoration:line-through;color:var(--muted)':''}">${esc(r.title)}</div>
      <div class="d">${r.due_date?fmtDate(r.due_date):"sin fecha"}${r.notes?" · "+esc(r.notes):""}</div></div>
      <div class="row" style="gap:6px"><button class="btn sm ${r.done?'ghost':'sec'}" data-done="${r.id}" title="${r.done?'Reabrir':'Marcar hecho'}">${r.done?ic('undo'):ic('check')}</button><button class="btn sm ghost" data-ed="${r.id}" title="Editar">${ic('pencil')}</button></div></div></div>`).join("") : (medUp.length?"":`<div class="empty">Sin recordatorios personalizados.</div>`));
  el("remList").innerHTML = html;
  c.querySelectorAll("[data-done]").forEach(b=> b.onclick=async()=>{ const r=list.find(x=>x.id===b.dataset.done); await sb.from("reminders").update({done:!r.done}).eq("id",r.id); renderRecordatorios(); });
  c.querySelectorAll("[data-ed]").forEach(b=> b.onclick=()=>openRemForm(list.find(x=>x.id===b.dataset.ed)));
}

// ---------- CONTACTOS ----------
async function renderContactos(){
  const c = pane();
  c.innerHTML = `<div class="sect-title"><h2>${ic('contacts')} Contactos</h2><button class="btn sm" id="addCon">${ic('plus')} Agregar</button></div><div id="conList"><div class="spin"></div></div>`;
  el("addCon").onclick = () => openConForm();
  const { data } = await sb.from("contacts").select("*").eq("family_id",S.family.id).order("role");
  const list = data||[];
  const ROLE = {veterinaria:{ic:'stethoscope',l:'Veterinaria'},peluqueria:{ic:'scissors',l:'Peluquería'},paseador:{ic:'paw',l:'Paseador'},otro:{ic:'contacts',l:'Otro'}};
  el("conList").innerHTML = list.length ? list.map(x=>{ const rr=ROLE[x.role]; return `<div class="item"><div class="top"><div class="grow">
    <div class="t"><span>${esc(x.name)}</span></div><div class="d">${rr?`${ic(rr.ic)} ${esc(rr.l)}`:esc(x.role)}${x.phone?" · "+esc(x.phone):""}${x.email?" · "+esc(x.email):""}</div>
    ${x.notes?`<div class="desc">${esc(x.notes)}</div>`:""}</div><button class="btn sm ghost" data-ed="${x.id}" title="Editar">${ic('pencil')}</button></div></div>`; }).join("") : `<div class="empty">Sin contactos.</div>`;

// ============ MODAL HELPER ============
function modal(title, bodyHTML, onMount){
  const root = el("modalRoot");
  root.innerHTML = `<div class="modal-bg"><div class="modal"><button class="close">×</button><h3>${esc(title)}</h3><div id="mBody">${bodyHTML}</div></div></div>`;
  const close = ()=> root.innerHTML="";
  root.querySelector(".close").onclick = close;
  root.querySelector(".modal-bg").onclick = e => { if(e.target.classList.contains("modal-bg")) close(); };
  if(onMount) onMount(close);
  return close;
}
function field(label,id,val,type="text",ph=""){ return `<label>${label}</label><input id="${id}" type="${type}" value="${val==null?'':esc(val)}" placeholder="${esc(ph)}">`; }
function area(label,id,val){ return `<label>${label}</label><textarea id="${id}">${val==null?'':esc(val)}</textarea>`; }
function selectF(label,id,val,opts){ return `<label>${label}</label><select id="${id}">${opts.map(o=>`<option value="${o[0]}" ${o[0]===val?'selected':''}>${esc(o[1])}</option>`).join("")}</select>`; }

// ---------- Forms ----------
function openPetForm(p){
  const isNew = !p; p = p||{};
  modal(isNew?"Nueva mascota":"Editar ficha",
    field("Nombre","f_name",p.name)+
    selectF("Especie","f_species",p.species||"perro",[["perro","Perro"],["gato","Gato"],["otro","Otro"]])+
    field("Raza","f_breed",p.breed)+
    selectF("Sexo","f_sex",p.sex||"",[["","—"],["hembra","Hembra"],["macho","Macho"]])+
    field("Edad aproximada","f_age",p.birthdate_approx,"text","~2 años")+
    field("Fecha de adopción","f_adopt",p.adoption_date,"date")+
    field("Microchip","f_chip",p.microchip)+
    field("Clínica","f_clinic",p.clinic_name)+
    selectF("Estado","f_status",p.status||"activo",[["activo","Activo"],["en tratamiento","En tratamiento"],["inactivo","Inactivo"]])+
    `<label>Esterilizada</label><select id="f_ster"><option value="false" ${!p.sterilized?'selected':''}>No</option><option value="true" ${p.sterilized?'selected':''}>Sí</option></select>`+
    field("Foto (URL, opcional)","f_photo",p.photo_url)+
    area("Notas","f_notes",p.notes)+
    `<div style="height:14px"></div><button class="btn block" id="save">Guardar</button>`+
    (isNew?"":`<div style="height:8px"></div><button class="btn danger block" id="del">Eliminar mascota</button>`),
    (close)=>{
      el("save").onclick = async ()=>{
        const row = { family_id:S.family.id, name:el("f_name").value.trim(), species:el("f_species").value, breed:el("f_breed").value.trim()||null,
          sex:el("f_sex").value||null, birthdate_approx:el("f_age").value.trim()||null, adoption_date:el("f_adopt").value||null,
          microchip:el("f_chip").value.trim()||null, clinic_name:el("f_clinic").value.trim()||null, status:el("f_status").value,
          sterilized:el("f_ster").value==="true", photo_url:el("f_photo").value.trim()||null, notes:el("f_notes").value.trim()||null };
        if(!row.name){ toast("Falta el nombre"); return; }
        el("save").disabled=true;
        let res;
        if(isNew) res = await sb.from("pets").insert(row).select().single();
        else res = await sb.from("pets").update(row).eq("id",p.id).select().single();
        if(res.error){ toast("Error: "+res.error.message); el("save").disabled=false; return; }
        close(); await reloadPets(res.data.id); toast("Guardado");
      };
      if(!isNew) el("del").onclick = async ()=>{
        if(!confirm("¿Eliminar a "+p.name+" y todos sus registros?")) return;
        await sb.from("pets").delete().eq("id",p.id); close(); await reloadPets(); toast("Eliminada");
      };
    });
}
async function reloadPets(selectId){
  const { data:pets } = await sb.from("pets").select("*").order("created_at",{ascending:true});
  S.pets = pets||[]; S.pet = S.pets.find(p=>p.id===selectId) || S.pets[0] || null;
  renderPetSelect(); renderTab();
}

function openOnboarding(){
  hideAllPanes();
  modal("¡Bienvenido!",
    `<p class="muted">Aún no perteneces a ninguna familia. Crea la tuya para empezar a registrar tus mascotas.</p>`+
    field("Nombre de la familia","f_fam","","text","Ej: Familia Paiva")+
    field("Nombre de tu primera mascota","f_pet","","text","Ej: Aurora")+
    `<div style="height:12px"></div><button class="btn block" id="create">Crear</button>`,
    (close)=>{
      el("create").onclick=async()=>{
        const fname=el("f_fam").value.trim(), pname=el("f_pet").value.trim();
        if(!fname||!pname){ toast("Completa ambos campos"); return; }
        el("create").disabled=true;
        const { data:fam, error:e1 } = await sb.from("families").insert({name:fname}).select().single();
        if(e1){ toast("Error: "+e1.message); el("create").disabled=false; return; }
        await sb.from("family_members").insert({ family_id:fam.id, user_id:S.user.id, email:S.user.email, role:"owner", joined_at:new Date().toISOString() });
        await sb.from("pets").insert({ family_id:fam.id, name:pname });
        close(); await loadFamiliesAndPets(); toast("¡Listo!");
      };
    });
}

el("addPetBtn").onclick = () => { if(!S.family){ return openOnboarding(); } openPetForm(); };
